<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>한국정치 기말 빈칸 연습</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">교재 지정 페이지 · 문단 빈칸</p>
      <h1>한국정치 기말 대비</h1>
    </div>
    <button class="icon-button" id="printButton" title="인쇄" aria-label="인쇄">⎙</button>
  </header>

  <main>
    <section class="status-band">
      <div class="stat"><strong id="paragraphCount">0</strong><span>전체 문단</span></div>
      <div class="stat"><strong id="blankCount">0</strong><span>전체 빈칸</span></div>
      <div class="stat"><strong id="solvedCount">0</strong><span>채점 완료</span></div>
      <p>교재 문장을 순서대로 복원하세요. 연도는 마지막 자리, 월은 숫자만 입력하며 날짜의 일은 제시됩니다.</p>
    </section>

    <nav class="page-tabs" id="pageTabs" aria-label="교재 페이지"></nav>
    <section class="quiz-list" id="quizList"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
